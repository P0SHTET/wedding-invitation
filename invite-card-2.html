<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Приглашение 2</title>
    <link rel="stylesheet" href="invite-cards.css" />
  </head>
  <body>
    <main class="card-page">
      <section class="story-card" aria-label="Локация и тайминг">
        <img
          class="story-card__leaf story-card__leaf--left"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />
        <img
          class="story-card__leaf story-card__leaf--right"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />

        <div class="info-card__inner">
          <header class="info-card__header">
            <h1 class="info-card__title">Локация</h1>
          </header>

          <div class="info-card__media">
            <img
              class="info-card__image"
              src="assets/place.webp"
              alt="Площадка White Garden"
              width="1170"
              height="1550"
            />
          </div>

          <div class="info-card__content">
            <div class="info-card__venue-block">
              <p class="info-card__venue">Площадка White Garden</p>
              <p class="info-card__address">ул. Павла Морозова, 79/5</p>
            </div>

            <h2 class="info-card__timeline-title">Тайминг</h2>
            <div class="info-card__timeline" aria-label="Тайминг">
              <article class="info-card__timeline-item info-card__timeline-item--left info-card__timeline-item--row-1">
                <p class="info-card__time">16:30</p>
                <p class="info-card__event">Сбор гостей</p>
              </article>

              <article class="info-card__timeline-item info-card__timeline-item--right info-card__timeline-item--row-2">
                <p class="info-card__time">17:00</p>
                <p class="info-card__event">Церемония</p>
              </article>

              <img
                class="info-card__arrow"
                src="assets/timing_arrow.webp"
                alt=""
                width="240"
                height="870"
              />

              <article class="info-card__timeline-item info-card__timeline-item--left info-card__timeline-item--row-3">
                <p class="info-card__time">18:00</p>
                <p class="info-card__event">Банкет</p>
              </article>

              <article class="info-card__timeline-item info-card__timeline-item--right info-card__timeline-item--row-4">
                <p class="info-card__time">23:00</p>
                <p class="info-card__event">Окончание</p>
              </article>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
