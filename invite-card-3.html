<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Приглашение 3</title>
    <link rel="stylesheet" href="invite-cards.css" />
  </head>
  <body>
    <main class="card-page">
      <section class="story-card" aria-label="Дресс-код">
        <img
          class="story-card__leaf story-card__leaf--left"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />
        <img
          class="story-card__leaf story-card__leaf--right"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />

        <div class="dress-card__inner">
          <h1 class="dress-card__title">Дресс-код</h1>

          <p class="dress-card__text">
            Мы очень старались сделать праздник красивым и будем рады, если в
            своих нарядах Вы поддержите цветовую гамму нашей свадьбы.
          </p>

          <div class="dress-card__media">
            <img
              class="dress-card__image"
              src="assets/dress.webp"
              alt="Пример оттенков дресс-кода"
              width="1170"
              height="1170"
            />
          </div>

          <div class="dress-card__palette" aria-label="Палитра свадьбы">
            <span class="dress-card__swatch" style="background: #5c4734"></span>
            <span class="dress-card__swatch" style="background: #856a57"></span>
            <span class="dress-card__swatch" style="background: #d8ccb4"></span>
            <span class="dress-card__swatch" style="background: #aebea4"></span>
            <span class="dress-card__swatch" style="background: #5e6846"></span>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
