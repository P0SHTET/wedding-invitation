<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Приглашение 1</title>
    <link rel="stylesheet" href="invite-cards.css" />
  </head>
  <body>
    <main class="card-page">
      <section class="story-card" aria-label="Приветствие">
        <img
          class="story-card__leaf story-card__leaf--left"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />
        <img
          class="story-card__leaf story-card__leaf--right"
          src="assets/leaf.webp"
          alt=""
          width="1280"
          height="1276"
        />

        <div class="story-card__inner">
          <div>
            <h1 class="story-card__title">Мы женимся!</h1>
            <p class="story-card__date">13 июня 2026</p>
          </div>

          <div class="story-card__media">
            <p class="story-card__label story-card__label--bride">невеста</p>
            <p class="story-card__label story-card__label--groom">жених</p>
            <div class="story-card__photo-frame">
              <img
                class="story-card__photo"
                src="assets/children_photo.webp"
                alt="Надя и Паша"
                width="980"
                height="980"
              />
            </div>
            <p class="story-card__names">Надя + Паша</p>
          </div>

          <div class="story-card__copy">
            <p class="story-card__greeting">Дорогие друзья и родные!</p>
            <p class="story-card__text">
              С большой радостью приглашаем Вас на наш первый семейный праздник
              – нашу свадьбу! Мы очень хотим, чтобы в этот день с нами рядом
              были наши самые близкие люди.
            </p>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
